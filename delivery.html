<div class="delivery-container">

    <h1>Verificar Entrega</h1>

    <p class="subtitulo">Digite seu CEP para consultar disponibilidade</p>

    <div class="cep-box">
        <input type="text" id="cep" placeholder="00000-000">
        <button onclick="verificarCEP()">Verificar</button>
    </div>

    <p id="resultado-cep"></p>

</div>

<script>
function verificarCEP() {
    let cep = document.getElementById("cep").value.replace(/\D/g, "");
    let resultado = document.getElementById("resultado-cep");

    if (cep.length !== 8) {
        resultado.innerText = "CEP inválido.";
        return;
    }

    fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(response => response.json())
        .then(data => {

            if (data.erro) {
                resultado.innerText = "CEP não encontrado.";
                return;
            }

            // EXEMPLO: definir regiões atendidas
            let cidadesAtendidas = [
                "São José do Rio Preto",
                "Mirassol",
                "Bady Bassitt"
            ];

            if (data.localidade === "São José do Rio Preto") {

    resultado.innerText =
        `Entrega disponível para ${data.localidade} ✔️ Frete R$25`;

} else if (data.localidade === "Mirassol") {

    resultado.innerText =
        `Entrega disponível para ${data.localidade} ✔️ Frete R$35`;

} else if (data.localidade === "Bady Bassitt") {

    resultado.innerText =
        `Entrega disponível para ${data.localidade} ✔️ Frete R$45`;

} else {

    resultado.innerText =
        `Desculpe, não entregamos para ${data.localidade} ❌`;

}
        })
        .catch(() => {
            resultado.innerText = "Erro ao consultar CEP.";
        });
}
</script>
